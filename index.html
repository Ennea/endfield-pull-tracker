<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Endfield Pull Tracker – Report</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section id="characters">
            <h2>Characters</h2>

            <div class="stats">
                <div class="left">
                    <span>Total pulls:</span>
                    <span>Avg. pulls per 5★:</span>
                    <span>Avg. pulls per 6★:</span>
                </div>
                <div class="right">
                    <span class="total"></span>
                    <span class="avg-5"></span>
                    <span class="avg-6"></span>
                </div>
            </div>
        </section>

        <div id="divider"></div>

        <section id="weapons">
            <h2>Weapons</h2>

            <div class="stats">
                <div class="left">
                    <span>Total pulls:</span>
                    <span>Avg. pulls per 5★:</span>
                    <span>Avg. pulls per 6★:</span>
                </div>
                <div class="right">
                    <span class="total"></span>
                    <span class="avg-5"></span>
                    <span class="avg-6"></span>
                </div>
            </div>
        </section>
    </main>

    <div id="tooltip">
        <h4 data-name="">
            <span class="name"></span>
            <span class="stars"></span>
            <span class="new">New</span>
            <span class="free">Free</span>
        </h4>
        <time></time>
    </div>

    <script src="script.js"></script>
</body>
</html>
